<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aylık Maaş Hesaplama</title>

<style>
body{
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #ece9e6, #ffffff);
    margin:0;
    padding:20px;
}

/* KART */
.kutu{
    max-width:650px;
    margin:auto;
    background:#ffffff;
    padding:30px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    border:1px solid #eee;
    transition:0.3s;
}

.kutu:hover{
    transform:translateY(-3px);
}

/* BAŞLIK */
h1{
    text-align:center;
    color:#2c3e50;
    margin-bottom:5px;
}

.aciklama{
    text-align:center;
    color:#7f8c8d;
    margin-bottom:25px;
    font-size:14px;
}

/* LABEL */
label{
    display:block;
    margin-top:15px;
    font-weight:bold;
    color:#34495e;
}

/* INPUT */
input{
    width:100%;
    padding:14px;
    border:1px solid #dcdcdc;
    border-radius:10px;
    margin-top:6px;
    font-size:14px;
    transition:0.2s;
}

input:focus{
    border-color:#6d4c41;
    outline:none;
    box-shadow:0 0 5px rgba(109,76,65,0.3);
}

/* BUTON */
button{
    width:100%;
    padding:15px;
    margin-top:20px;
    background:linear-gradient(135deg,#6d4c41,#8d6e63);
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
    opacity:0.95;
}

/* SONUÇ */
#sonuc{
    margin-top:25px;
    padding:18px;
    background:linear-gradient(135deg,#f1f8e9,#e8f5e9);
    border-radius:12px;
    line-height:1.8;
    border-left:5px solid #6d4c41;
}

/* BAŞLIK SONUÇ */
#sonuc h2{
    color:#2e7d32;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="kutu">

<h1>💰 Aylık Maaş Hesaplama</h1>

<div class="aciklama">
Net maaş, izin ve fazla mesai hesaplama sistemi
</div>

<label>Net Maaşınız (TL)</label>
<input type="number" id="maas" placeholder="30000">

<label>Kullanılan İzin Günü</label>
<input type="number" id="izin" placeholder="0">

<label>Fazla Mesai Saati</label>
<input type="number" id="mesai" placeholder="0">

<button onclick="hesapla()">HESAPLA</button>

<div id="sonuc"></div>

</div>

<script>
function hesapla(){

let maas = Number(document.getElementById("maas").value);
let izin = Number(document.getElementById("izin").value);
let mesai = Number(document.getElementById("mesai").value);

let gunlukUcret = maas / 30;
let saatlikUcret = maas / 225;

let izinSaati = izin * 7.5;

let netMesai = 0;
let kalanIzinSaati = 0;

if(mesai >= izinSaati){
    netMesai = mesai - izinSaati;
}else{
    kalanIzinSaati = izinSaati - mesai;
}

let fazlaMesaiTutari = saatlikUcret * 1.5 * netMesai;

let izinKesintisi = kalanIzinSaati * saatlikUcret;

let toplamMaas = maas + fazlaMesaiTutari - izinKesintisi;

document.getElementById("sonuc").innerHTML = `
<b>Net Maaş:</b> ${maas.toLocaleString('tr-TR')} TL<br>
<b>Günlük Ücret:</b> ${gunlukUcret.toFixed(2)} TL<br>
<b>Saatlik Ücret:</b> ${saatlikUcret.toFixed(2)} TL<br><br>

<b>Kullanılan İzin:</b> ${izin} Gün (${izinSaati.toFixed(1)} Saat)<br>
<b>Girilen Fazla Mesai:</b> ${mesai} Saat<br>
<b>İzinden Sonra Kalan Fazla Mesai:</b> ${netMesai.toFixed(1)} Saat<br>
<b>Maaştan Düşülen Süre:</b> ${kalanIzinSaati.toFixed(1)} Saat<br>
<b>Fazla Mesai Kazancı:</b> ${fazlaMesaiTutari.toFixed(2)} TL<br>
<b>İzin Kesintisi:</b> ${izinKesintisi.toFixed(2)} TL<br>

<hr>
<h2>Toplam Maaş: ${toplamMaas.toFixed(2)} TL</h2>
`;
}
</script>

</body>
</html>
