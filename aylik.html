<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aylık Maaş Hesaplama</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ece9e6, #ffffff);
    margin:0;
    padding:20px;
}

/* ANA KUTU */
.kutu{
    max-width:650px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.12);
}

/* DUYURU */
.duyuru{
    background: linear-gradient(135deg, #fff3cd, #ffe8a1);
    border-left: 6px solid #ff9800;
    padding:15px 18px;
    border-radius:12px;
    margin-bottom:20px;
    color:#5a4b00;
    font-size:14px;
    line-height:1.6;
}

/* BAŞLIK */
h1{
    text-align:center;
    color:#2c3e50;
    margin-bottom:5px;
}

/* AÇIKLAMA */
.aciklama{
    text-align:center;
    color:#7f8c8d;
    font-size:14px;
    margin-bottom:20px;
    line-height:1.5;
}

/* LABEL */
label{
    display:block;
    margin-top:15px;
    font-weight:bold;
    color:#34495e;
}

/* INPUT */
input{
    width:100%;
    padding:14px;
    margin-top:6px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#6d4c41;
    box-shadow:0 0 6px rgba(109,76,65,0.2);
}

/* BUTON */
button{
    width:100%;
    margin-top:20px;
    padding:15px;
    background:linear-gradient(135deg,#6d4c41,#8d6e63);
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    transform:scale(1.02);
}

/* SONUÇ */
#sonuc{
    margin-top:25px;
    padding:18px;
    background:#f1f8e9;
    border-left:5px solid #6d4c41;
    border-radius:10px;
    line-height:1.7;
}

#sonuc h2{
    color:#2e7d32;
}
</style>
</head>

<body>

<div class="kutu">

<!-- 📢 DUYURU -->
<div class="duyuru">
<b>📢 Duyuru</b><br><br>

Hesaplama sistemi <b>7,5 saat günlük çalışma</b> üzerinden yapılır.<br><br>

İzinler ilk olarak <b>fazla mesainiz varsa oradan düşülür</b>.<br>
Eğer fazla mesai, izin süresini karşılamazsa kalan tutar <b>maaştan düşülür</b>.
</div>

<h1>💰 Aylık Maaş Hesaplama</h1>

<div class="aciklama">
Net maaş, izin günleri ve fazla mesai saatlerine göre otomatik hesaplama
</div>

<label>Net Maaş (TL)</label>
<input type="number" id="maas" placeholder="30000">

<label>Kullanılan İzin (Gün)</label>
<input type="number" id="izin" placeholder="0">

<label>Fazla Mesai (Saat)</label>
<input type="number" id="mesai" placeholder="0">

<button onclick="hesapla()">HESAPLA</button>

<div id="sonuc"></div>

</div>

<script>
function hesapla(){

let maas = Number(document.getElementById("maas").value);
let izin = Number(document.getElementById("izin").value);
let mesai = Number(document.getElementById("mesai").value);

let gunlukUcret = maas / 30;
let saatlikUcret = maas / 225;

let izinSaati = izin * 7.5;

let netMesai = 0;
let kalanIzinSaati = 0;

if(mesai >= izinSaati){
    netMesai = mesai - izinSaati;
}else{
    kalanIzinSaati = izinSaati - mesai;
}

let fazlaMesaiTutari = saatlikUcret * 1.5 * netMesai;
let izinKesintisi = kalanIzinSaati * saatlikUcret;

let toplamMaas = maas + fazlaMesaiTutari - izinKesintisi;

document.getElementById("sonuc").innerHTML = `
<b>Net Maaş:</b> ${maas.toLocaleString('tr-TR')} TL<br>
<b>Günlük Ücret:</b> ${gunlukUcret.toFixed(2)} TL<br>
<b>Saatlik Ücret:</b> ${saatlikUcret.toFixed(2)} TL<br><br>

<b>Kullanılan İzin:</b> ${izin} Gün (${izinSaati.toFixed(1)} Saat)<br>
<b>Fazla Mesai:</b> ${mesai} Saat<br>
<b>İzinden Sonra Kalan Mesai:</b> ${netMesai.toFixed(1)} Saat<br>
<b>İzin Açığı:</b> ${kalanIzinSaati.toFixed(1)} Saat<br><br>

<b>Fazla Mesai Kazancı:</b> ${fazlaMesaiTutari.toFixed(2)} TL<br>
<b>İzin Kesintisi:</b> ${izinKesintisi.toFixed(2)} TL<br>

<hr>
<h2>Toplam Maaş: ${toplamMaas.toFixed(2)} TL</h2>
`;
}
</script>

</body>
</html>
